name: Deploy RAG Worker

# Manual-only per ADR-0010: the RAG worker is deployed via `workflow_dispatch`
# from the GitHub UI, never on a push. Avoids accidental deploys of a
# merged-but-untested commit.
#
# Required GitHub environment secrets:
#   CLOUDFLARE_API_TOKEN  — Cloudflare API token (Workers + D1 + R2 + Vectorize edit)
#   CLOUDFLARE_ACCOUNT_ID — Cloudflare account ID
#   OPENROUTER_API_KEY    — OpenRouter API key (required only when LLM_PROVIDER=openrouter)
#   KB_INGEST_KEY         — Shared secret gating KB write/ingest endpoints (ADR-0014)
#
# One-time resource bootstrap (prerequisite before first deploy):
#   1. Create D1 database `reyn_kb`:
#        wrangler d1 create reyn_kb
#   2. Create Vectorize index `reyn-kb-bge-base` (768 dims, cosine):
#        wrangler vectorize create reyn-kb-bge-base --dimensions=768 --metric=cosine
#   3. Create R2 bucket `reyn-kb-content`:
#        wrangler r2 bucket create reyn-kb-content
#   4. Fill the real `database_id` in apps/reyn-rag-worker/wrangler.toml and commit.
# Full bootstrap procedure: docs/rag/operations.md

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        default: production
        type: choice
        options:
          - production

permissions:
  contents: read

concurrency:
  group: deploy-rag-worker-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Apply migrations + deploy RAG worker
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/reyn-rag-worker
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Apply KB D1 migrations
        # Idempotent: wrangler tracks applied migrations and skips ones
        # already in __MigrationsHistory.
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec wrangler d1 migrations apply reyn_kb --remote

      - name: Push secrets (no-op if already present)
        # Secrets are stored encrypted in Cloudflare; we re-push to ensure
        # the deploy lines up with whatever the repo intends. The values
        # come from GitHub environment secrets; never logged.
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          KB_INGEST_KEY: ${{ secrets.KB_INGEST_KEY }}
        run: |
          echo "$OPENROUTER_API_KEY" | pnpm exec wrangler secret put OPENROUTER_API_KEY
          echo "$KB_INGEST_KEY" | pnpm exec wrangler secret put KB_INGEST_KEY

      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec wrangler deploy

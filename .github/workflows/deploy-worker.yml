name: Deploy Worker

# Manual-only per ADR-0010: the worker is deployed via `workflow_dispatch`
# from the GitHub UI, never on a push. Avoids accidental deploys of a
# merged-but-untested commit.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        default: production
        type: choice
        options:
          - production

permissions:
  contents: read

concurrency:
  group: deploy-worker-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Apply migrations + deploy
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/reyn-cloud-worker
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Apply Accounts D1 migrations
        # Idempotent: wrangler tracks applied migrations and skips ones
        # already in __MigrationsHistory.
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec wrangler d1 migrations apply reyn_accounts --remote

      - name: Apply shared user-data D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec wrangler d1 migrations apply reyn_user_data_shared --remote

      - name: Push secrets (no-op if already present)
        # Secrets are stored encrypted in Cloudflare; we re-push to ensure
        # the deploy lines up with whatever the repo intends. The values
        # come from GitHub environment secrets; never logged.
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SESSION_PEPPER: ${{ secrets.SESSION_PEPPER }}
        run: |
          echo "$SESSION_PEPPER" | pnpm exec wrangler secret put SESSION_PEPPER

      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec wrangler deploy
